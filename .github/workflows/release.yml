name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: tar.gz
            bin: minimalfetch

          - os: macos-latest
            target: x86_64-apple-darwin
            ext: tar.gz
            bin: minimalfetch

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: zip
            bin: minimalfetch.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      # -------------------------
      # PACKAGE
      # -------------------------
      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"

          mkdir dist
          cp target/release/${{ matrix.bin }} dist/

          tar -czf \
            "minimalfetch-${VERSION}-${{ matrix.target }}.${{ matrix.ext }}" \
            -C dist ${{ matrix.bin }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${env:GITHUB_REF_NAME}"

          mkdir dist
          Copy-Item "target/release/minimalfetch.exe" "dist/"

          Compress-Archive `
            -Path "dist/minimalfetch.exe" `
            -DestinationPath "minimalfetch-$version-${{ matrix.target }}.${{ matrix.ext }}"

      # -------------------------
      # UPLOAD
      # -------------------------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: minimalfetch-${{ matrix.target }}
          path: |
            *.tar.gz
            *.zip